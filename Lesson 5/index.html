<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables, lists, atributes</title>
    <style>
        table, td, th{
            border: 1px solid;
            border-collapse: collapse;
        }
    </style>
</head>
<body>
    <table>
        <thead>
        <tr>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Age</th>
            <th>City</th>
        </tr>
        </thead>

        <tbody>
        <tr>
            <td>Jora</td>
            <td>Haliti</td>
            <td>16</td>
            <td>Prishtine</td>
        </tr>

        <tr>
            <td>Blerta</td>
            <td>Hajdini</td>
            <td>25</td>
            <td>Prishtine</td>
        </tr>
        <tfoot>
                <tr>
                    <td colspan="4">Table footer</td>
                </tr>
            </tfoot>
        </tbody>
    </table>
    <br><br><br><br>
    <table>
        <tr>
            <th>Name:</th>
            <td>Jora Haliti</td>
            <td>Edisona Dupoleva</td>
        </tr>
        <tr>
            <th rowspan="2">Email:</th>
            <td>jorahaliti@gmail.com</td>
            <td rowspan="2">edisona.d@gmail.com</td>
        </tr>
        <tr>
            <td>joraahaliti@gmail.com</td>
        </tr>
    </table>
</body>
</html>
